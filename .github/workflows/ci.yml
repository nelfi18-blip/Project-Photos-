name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npx eslint . || echo "ESLint completed with warnings"
      continue-on-error: true

  frontend-lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npx eslint src/ || echo "ESLint completed with warnings"
      continue-on-error: true
    
    - name: Build
      run: npm run build
      env:
        VITE_API_URL: http://localhost:4000

  docker-build-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create .env file for testing
      run: |
        echo "JWT_SECRET=test-secret-key-for-ci" > .env
        echo "CLOUDINARY_CLOUD_NAME=test" >> .env
        echo "CLOUDINARY_API_KEY=test" >> .env
        echo "CLOUDINARY_API_SECRET=test" >> .env
    
    - name: Test Docker Compose build
      run: docker compose build
